name: Morning Audio Brief

on:
  schedule:
    # Backup runs only — they skip when today's episode already exists. The
    # primary trigger is a cron-job.org job that fires workflow_dispatch via
    # the GitHub API at exactly 4:00am PT — GitHub's schedule events are
    # best-effort and routinely run 15-60+ min late, so they sit AFTER the
    # primary and only matter when the 4am run failed.
    - cron: '30 4 * * 1-5'
      timezone: "America/Los_Angeles"
    - cron: '0 5 * * 1-5'
      timezone: "America/Los_Angeles"
  workflow_dispatch:   # Fired by cron-job.org (primary) or manually for testing
    inputs:
      force:
        description: "Regenerate even if today's episode already exists"
        type: boolean
        default: false

concurrency:
  group: morning-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing episode
        id: existing_episode
        run: |
          # Skip if today's episode is already committed, regardless of trigger
          # (scheduled backup or dispatched retry). Pass force=true on a manual
          # dispatch to regenerate anyway.
          today=$(TZ=America/Los_Angeles date +%F)
          if [ -f "docs/episodes/${today}.mp3" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Episode already exists for ${today}; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        if: steps.existing_episode.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.existing_episode.outputs.exists != 'true'
        run: pip install -r requirements.txt

      - name: Install ffmpeg (required by pydub for MP3 handling)
        if: steps.existing_episode.outputs.exists != 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run pipeline
        if: steps.existing_episode.outputs.exists != 'true'
        env:
          TZ: America/Los_Angeles
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GITHUB_PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MARKET_NEWS_PROMPT: ${{ secrets.MARKET_NEWS_PROMPT }}
          NEW_ISSUES_PROMPT: ${{ secrets.NEW_ISSUES_PROMPT }}
          RESEARCH_DIGEST_PROMPT: ${{ secrets.RESEARCH_DIGEST_PROMPT }}
          RESEARCH_SENDER_WHITELIST: ${{ secrets.RESEARCH_SENDER_WHITELIST }}
        run: python main.py

      - name: Commit and push episode files
        if: steps.existing_episode.outputs.exists != 'true'
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "action@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily brief: $(date +%Y-%m-%d)"
          git push
