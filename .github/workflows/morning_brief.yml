name: Morning Audio Brief

on:
  schedule:
    # 5:00am PT (12:00 UTC) — daylight saving time (March–November)
    # Change to '0 13 * * 1-5' during standard time (November–March)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab for testing

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg (required by pydub for MP3 handling)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GITHUB_PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MARKET_NEWS_PROMPT: ${{ secrets.MARKET_NEWS_PROMPT }}
          NEW_ISSUES_PROMPT: ${{ secrets.NEW_ISSUES_PROMPT }}
        run: python main.py

      - name: Commit and push episode files
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "action@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily brief: $(date +%Y-%m-%d)"
          git push
